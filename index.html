<style>
:root {
  --bg:#09090e; --bg2:#0f0f16; --bg3:#14141e;
  --border:rgba(255,255,255,0.07);
  --accent:#00e5cc; --adim:rgba(0,229,204,0.12); --aglow:rgba(0,229,204,0.35);
  --text:#e8e8f0; --muted:#6b6b80; --muted2:#9898a8;
  --display:'Syne',sans-serif; --body:'Barlow',sans-serif; --cond:'Barlow Condensed',sans-serif;
  --r:4px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid transparent;transition:background 0.3s,border-color 0.3s}
nav.scrolled{background:rgba(9,9,14,0.92);backdrop-filter:blur(20px);border-color:var(--border)}
.nav-logo{font-family:var(--display);font-weight:800;font-size:0.95rem}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{font-family:var(--cond);font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted2);transition:color 0.25s}
.nav-links a:hover{color:var(--accent)}
.nav-hire{background:var(--accent)!important;color:var(--bg)!important;padding:0.4rem 1rem!important;border-radius:var(--r);font-weight:600!important}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{width:24px;height:2px;background:var(--text);display:block}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(9,9,14,0.97);backdrop-filter:blur(20px);z-index:99;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem}
.mobile-menu.open{display:flex}
.mobile-menu a{font-family:var(--display);font-size:2rem;font-weight:800;color:var(--text)}
.mobile-menu a:hover{color:var(--accent)}
.mobile-close{position:absolute;top:1.5rem;right:2rem;font-size:2rem;color:var(--muted);cursor:pointer}

#hero{min-height:100vh;display:flex;align-items:stretch;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 70% 80% at 30% 50%,black 10%,transparent 75%);pointer-events:none}
.hero-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,204,0.07) 0%,transparent 65%);top:-200px;left:-150px;pointer-events:none;animation:pulse 7s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

.hero-text{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:9rem 4rem 6rem;max-width:580px}
.hero-label{font-family:var(--cond);font-size:0.75rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem}
.hero-name{font-family:var(--display);font-weight:800;font-size:clamp(2.4rem,4.8vw,5.2rem);line-height:0.92;letter-spacing:-0.02em;margin-bottom:1.75rem}
.hero-name em{font-style:normal;color:transparent;-webkit-text-stroke:1.5px var(--accent)}
.hero-tagline{font-family:var(--cond);font-size:1.1rem;letter-spacing:0.04em;color:var(--muted2);margin-bottom:2.5rem;min-height:1.8rem}
.typed-cursor{color:var(--accent);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hero-ctas{display:flex;gap:1rem;flex-wrap:wrap}

.btn-primary{display:inline-flex;align-items:center;gap:0.5rem;background:var(--accent);color:var(--bg);font-family:var(--cond);font-size:0.88rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:0.85rem 2rem;border-radius:var(--r);transition:transform 0.25s,box-shadow 0.25s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px var(--aglow)}
.btn-outline{display:inline-flex;align-items:center;gap:0.5rem;background:transparent;color:var(--text);font-family:var(--cond);font-size:0.88rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:0.85rem 2rem;border-radius:var(--r);border:1px solid var(--border);transition:border-color 0.25s,color 0.25s,transform 0.25s}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

.hero-photo-side{position:relative;z-index:2;width:clamp(300px,42vw,620px);flex-shrink:0}
.hero-photo-inner{position:absolute;inset:0;overflow:hidden;cursor:crosshair}
.hero-photo-inner::before{content:'';position:absolute;top:0;bottom:0;left:0;width:140px;background:linear-gradient(to right,var(--bg),transparent);z-index:4;pointer-events:none}
.photo-normal,.photo-alt{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 15%;transition:opacity 0.65s cubic-bezier(0.4,0,0.2,1)}
.photo-normal{opacity:1;z-index:1}
.photo-alt{opacity:0;z-index:2}
.hero-photo-inner:hover .photo-normal{opacity:0}
.hero-photo-inner:hover .photo-alt{opacity:1}
.photo-corner{position:absolute;width:18px;height:18px;border-color:var(--accent);border-style:solid;z-index:6;pointer-events:none;opacity:0;transition:opacity 0.3s ease}
.hero-photo-inner:hover .photo-corner{opacity:1}
.photo-corner.tl{top:14px;left:14px;border-width:2px 0 0 2px}
.photo-corner.tr{top:14px;right:14px;border-width:2px 2px 0 0}
.photo-corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px}
.photo-corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0}
.photo-hint{position:absolute;bottom:14px;right:14px;font-family:var(--cond);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);background:rgba(9,9,14,0.78);backdrop-filter:blur(6px);padding:0.22rem 0.6rem;border-radius:3px;border:1px solid rgba(0,229,204,0.25);z-index:7;pointer-events:none;transition:opacity 0.3s}
.hero-photo-inner:hover .photo-hint{opacity:0}
.hero-scroll{position:absolute;bottom:2rem;left:4rem;display:flex;align-items:center;gap:0.75rem;font-family:var(--cond);font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);z-index:3}
.scroll-line{width:40px;height:1px;background:linear-gradient(to right,var(--accent),transparent)}

section:not(#hero){padding:6rem 4rem}
.sec-label{font-family:var(--cond);font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.sec-title{font-family:var(--display);font-weight:800;font-size:clamp(2rem,5vw,3.5rem);line-height:1.05;letter-spacing:-0.02em;margin-bottom:1rem}
.sec-bar{width:40px;height:3px;background:var(--accent);margin-bottom:3rem;border-radius:2px}
.reveal{opacity:1;transform:none}
.js-ready .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.65s ease,transform 0.65s ease}
.js-ready .reveal.on{opacity:1;transform:none}

#about{background:var(--bg2)}
.about-grid{display:grid;grid-template-columns:auto 1fr;gap:4rem;align-items:start;max-width:900px}
.avatar{width:120px;height:120px;border-radius:50%;background:var(--adim);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:2rem;font-weight:800;color:var(--accent);flex-shrink:0;position:relative}
.avatar::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px dashed rgba(0,229,204,0.25);animation:spin 15s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.bio{font-size:1.05rem;line-height:1.75;color:var(--muted2);margin-bottom:1.5rem}
.bio strong{color:var(--text)}
.about-meta{display:flex;gap:2rem;flex-wrap:wrap;font-family:var(--cond);font-size:0.85rem;color:var(--muted)}
.about-meta span::before{content:'→ ';color:var(--accent)}

#skills{background:var(--bg)}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1.5rem}
.skill-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:1.75rem;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s}
.skill-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity 0.3s}
.skill-card:hover{border-color:rgba(0,229,204,0.3);transform:translateY(-3px)}
.skill-card:hover::before{opacity:1}
.skill-card-title{font-family:var(--cond);font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:1.25rem}
.tags{display:flex;flex-wrap:wrap;gap:0.5rem}
.tag{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:0.3rem 0.7rem;font-family:var(--cond);font-size:0.82rem;color:var(--muted2);transition:border-color 0.25s,color 0.25s}
.tag:hover{border-color:var(--accent);color:var(--accent)}

#projects{background:var(--bg2)}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}
.proj-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:2rem;display:flex;flex-direction:column;gap:1rem;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s,box-shadow 0.3s}
.proj-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--adim) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;pointer-events:none}
.proj-card:hover{border-color:rgba(0,229,204,0.35);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.proj-card:hover::after{opacity:1}
.proj-card.featured{grid-column:span 2}
.proj-num{font-family:var(--display);font-size:0.7rem;color:var(--accent);letter-spacing:0.15em;opacity:0.6;position:relative;z-index:1}
.proj-badge{display:inline-block;background:rgba(0,229,204,0.1);border:1px solid rgba(0,229,204,0.3);color:var(--accent);font-family:var(--cond);font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:3px}
.proj-name{font-family:var(--display);font-weight:700;font-size:1.15rem;line-height:1.2;position:relative;z-index:1;transition:color 0.25s}
.proj-card:hover .proj-name{color:var(--accent)}
.proj-desc{font-size:0.9rem;line-height:1.65;color:var(--muted2);flex:1;position:relative;z-index:1}
.proj-stack{display:flex;flex-wrap:wrap;gap:0.4rem;position:relative;z-index:1}
.stag{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:3px;padding:0.2rem 0.55rem;font-family:var(--cond);font-size:0.75rem;color:var(--muted)}

#education{background:var(--bg)}
.edu-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:2.5rem;max-width:740px;position:relative;overflow:hidden}
.edu-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),transparent)}
.edu-year{font-family:var(--cond);font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem}
.edu-deg{font-family:var(--display);font-weight:700;font-size:1.6rem;margin-bottom:0.4rem}
.edu-uni{font-family:var(--cond);font-size:1rem;color:var(--muted2);margin-bottom:2rem}
.cw-title{font-family:var(--cond);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.cw-list{display:flex;flex-wrap:wrap;gap:0.5rem}
.cw-tag{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:0.3rem 0.75rem;font-family:var(--cond);font-size:0.82rem;color:var(--muted2);transition:border-color 0.25s,color 0.25s}
.cw-tag:hover{border-color:var(--accent);color:var(--text)}

#contact{background:var(--bg2);text-align:center;position:relative;overflow:hidden}
#contact .sec-bar{margin:0 auto 3rem}
.contact-sub{font-size:1.05rem;color:var(--muted2);max-width:460px;margin:0 auto 3rem;line-height:1.7}
.contact-links{display:flex;justify-content:center;flex-wrap:wrap;gap:1.25rem}
.clink{display:flex;align-items:center;gap:0.6rem;font-family:var(--cond);font-size:0.88rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted2);padding:0.7rem 1.4rem;border:1px solid var(--border);border-radius:var(--r);transition:color 0.25s,border-color 0.25s,transform 0.25s}
.clink:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-2px)}
.clink svg{width:16px;height:16px;flex-shrink:0}

footer{background:var(--bg);border-top:1px solid var(--border);padding:1.75rem 2.5rem;display:flex;align-items:center;justify-content:space-between;font-family:var(--cond);font-size:0.8rem;color:var(--muted)}
.foot-logo{font-family:var(--display);font-weight:800;font-size:1rem;color:var(--text)}
.foot-logo span{color:var(--accent)}
footer em{font-style:normal;color:var(--accent)}

@media(max-width:960px){
  nav{padding:0.9rem 1.5rem}
  .nav-links{display:none}
  .hamburger{display:flex}
  #hero{flex-direction:column}
  .hero-text{max-width:100%;padding:7rem 1.5rem 2rem}
  .hero-name{font-size:clamp(2.4rem,10vw,4rem)}
  .hero-photo-side{width:100%;height:80vw;max-height:440px;flex-shrink:0;position:relative}
  .hero-photo-inner::before{display:none}
  .hero-scroll{left:1.5rem}
  section:not(#hero){padding:4rem 1.5rem}
  .about-grid{grid-template-columns:1fr;gap:2rem}
  .proj-grid{grid-template-columns:1fr}
  .proj-card.featured{grid-column:span 1}
  footer{flex-direction:column;gap:0.5rem;text-align:center;padding:1.5rem}
}
@media(max-width:600px){
  .skills-grid{grid-template-columns:1fr}
  .contact-links{flex-direction:column;align-items:stretch}
  .clink{justify-content:center}
  .hero-photo-side{height:90vw;max-height:400px}
}
</style>
</head>
